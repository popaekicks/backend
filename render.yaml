services:
  # Backend Web Service
  - type: web
    name: task-manager-backend
    plan: free # Explicitly set to free
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString

  # Frontend Static Site
  - type: web
    name: task-manager-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Rewrite /api requests to the backend service
      - type: rewrite
        source: /api/*
        destination: https://task-manager-backend.onrender.com/api/*

databases:
  - name: task-manager-db
    plan: free
